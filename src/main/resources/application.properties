# General application settings
spring.application.name=${SPRING_APPLICATION_NAME:Complaint Management System}

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}
#spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT}
# spring.jpa.properties.hibernate.default_batch_fetch_size=500   # Uncomment if batching optimization is needed

# Allow up to 10,000 results per page
spring.data.web.pageable.max-page-size=5000

# Hibernate statistics and SQL tracing (commented out for production)
# spring.jpa.properties.hibernate.generate_statistics=true
# logging.level.org.hibernate.SQL=DEBUG
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
# logging.level.org.hibernate.stat=DEBUG
# logging.level.org.hibernate.event=DEBUG
# logging.level.org.hibernate.engine.internal.StatisticalLoggingSessionEventListener=DEBUG
# logging.level.org.hibernate.loader.collection=TRACE
# logging.level.org.hibernate.engine.internal=TRACE

# Logging levels
logging.level.com.system.complaints.service=${LOGGING_LEVEL_COMPLAINTS_SERVICE:DEBUG}
logging.level.org.springframework.security=${LOGGING_LEVEL_SPRING_SECURITY:DEBUG}

# Google Drive
google.drive.folder-id=${GOOGLE_DRIVE_FOLDER_ID}
google.drive.client-id=${GOOGLE_CLIENT_ID}
google.drive.client-secret=${GOOGLE_CLIENT_SECRET}
google.drive.refresh-token=${GOOGLE_REFRESH_TOKEN}


# CORS configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Dotenv support (optional, remove if not using dotenv in Spring)
dotenv.enabled=true
dotenv.overload=true

# Set session timeout to 7 days (in seconds)
server.servlet.session.timeout=604800
