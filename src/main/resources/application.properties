# General application settings
spring.application.name=${SPRING_APPLICATION_NAME:Complaint Management System}

# Database configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}
#spring.jpa.properties.hibernate.dialect=${SPRING_JPA_HIBERNATE_DIALECT}
# spring.jpa.properties.hibernate.default_batch_fetch_size=500

# Allow up to 10,000 results per page
spring.data.web.pageable.max-page-size=5000

# Logging levels
logging.level.com.system.complaints.service=${LOGGING_LEVEL_COMPLAINTS_SERVICE:DEBUG}
logging.level.org.springframework.security=${LOGGING_LEVEL_SPRING_SECURITY:DEBUG}

# Google Drive
google.drive.folder-id=${GOOGLE_DRIVE_FOLDER_ID}
google.drive.client-id=${GOOGLE_CLIENT_ID}
google.drive.client-secret=${GOOGLE_CLIENT_SECRET}
google.drive.refresh-token=${GOOGLE_REFRESH_TOKEN}

# CORS configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Dotenv support
dotenv.enabled=true
dotenv.overload=true

# Session timeout
server.servlet.session.timeout=604800

# Cross-site session cookie settings for Railway frontend/backend
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

# Respect proxy headers from Railway
server.forward-headers-strategy=framework